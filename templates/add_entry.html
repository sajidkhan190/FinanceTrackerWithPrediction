{% extends "base.html" %}
{% block title %}Add Income | Finance Tracker{% endblock %}

{% block extra_css %}
<style>
    .income-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    .income-card .card-header {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); /* Green theme for income */
        padding: 25px 30px;
        border: none;
    }
    .income-card .card-header h3 {
        color: white;
        margin: 0;
        font-weight: 700;
    }
    .income-card .card-header p {
        color: rgba(255,255,255,0.8);
        margin: 5px 0 0 0;
        font-size: 14px;
    }
    .income-card .card-body {
        padding: 30px;
    }
    .form-label {
        font-weight: 600;
        color: #444;
        font-size: 14px;
        margin-bottom: 6px;
    }
    .form-control, .form-select {
        border-radius: 10px;
        padding: 12px 15px;
        border: 2px solid #e8e8e8;
        transition: all 0.3s ease;
        font-size: 15px;
    }
    .form-control:focus, .form-select:focus {
        border-color: #11998e;
        box-shadow: 0 0 0 3px rgba(17,153,142,0.15);
    }
    .input-icon {
        position: relative;
    }
    .input-icon i {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: #999;
        font-size: 16px;
    }
    .input-icon .form-control,
    .input-icon .form-select {
        padding-left: 42px;
    }
    .btn-submit {
        background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: white;
        transition: all 0.3s ease;
    }
    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(17,153,142,0.4);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
        <div class="card income-card">
            <div class="card-header">
                <h3><i class="bi bi-cash-coin me-2"></i>Add New Income</h3>
                <p><i class="bi bi-info-circle me-1"></i>Record your incoming money</p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="bi bi-calendar-event me-1"></i>Date</label>
                            <div class="input-icon">
                                <input type="date" name="date" class="form-control" required>
                            </div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label"><i class="bi bi-currency-exchange me-1"></i>Amount (Rs.)</label>
                            <div class="input-icon">
                                <i class="bi bi-cash"></i>
                                <input type="number" step="0.01" min="1" name="amount" class="form-control" placeholder="e.g. 50000" required>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label"><i class="bi bi-tag me-1"></i>Category</label>
                        <select name="category" class="form-select" required>
                            <option value="" disabled selected>-- Select Income Source --</option>
                            <option value="Salary">💼 Salary</option>
                            <option value="Business">🏢 Business / Shop</option>
                            <option value="Freelancing">💻 Freelancing</option>
                            <option value="Investments">📈 Investments / Profit</option>
                            <option value="Rental Income">🏠 Rental Income</option>
                            <option value="Pocket Money">💰 Pocket Money / Allowance</option>
                            <option value="Other">📋 Other</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label"><i class="bi bi-chat-left-text me-1"></i>Description (optional)</label>
                        <div class="input-icon">
                            <i class="bi bi-pencil"></i>
                            <input type="text" name="description" class="form-control" placeholder="e.g. March Salary">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-submit w-100">
                        <i class="bi bi-plus-circle me-2"></i>Add Income
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
